name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        run: pnpm --filter @birga/crdt --filter @birga/protocol --filter @birga/client build

      - name: Typecheck
        run: >
          pnpm
          --filter @birga/crdt
          --filter @birga/protocol
          --filter @birga/client
          --filter @birga/server
          typecheck

      - name: Test (CRDT property suite, server, client)
        run: pnpm -r test

      - name: Build web app
        run: pnpm --filter @birga/web build
